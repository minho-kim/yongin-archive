<!DOCTYPE html>
<html lang="ko">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>용인 옛 사진전 : 옷장 속 사진첩 (프로토타입)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 사진이 필터링될 때 부드럽게 나타나도록 애니메이션 CSS 추가 */
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans p-8 min-h-screen">
    
    <header class="max-w-6xl mx-auto mb-12 text-center">
        <h1 class="text-4xl font-bold mb-4">용인 옛 사진전 : 옷장 속 사진첩</h1>
        <p class="text-lg text-gray-600">시민의 기억이 모여 지역의 역사가 됩니다. <br><span class="text-sm text-blue-500">(사업 제안 시연용 동적 프로토타입)</span></p>
    </header>

    <section id="filter-container" class="max-w-6xl mx-auto mb-10 flex flex-wrap gap-3 justify-center">
    </section>

    <section id="gallery-container" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
    </section>

    <script>
        // 전역 상태: 더미 데이터베이스
        const DUMMY_ARCHIVES = [
            {
                id: "photo_001",
                imageUrl: "https://images.unsplash.com/photo-1582213782179-e0d53f98f2ca?q=80&w=600&auto=format&fit=crop",
                title: "1980년대 구갈동 마을 잔치",
                year: "1985",
                location: "기흥구 구갈동",
                donor: "김용인",
                tags: ["마을잔치", "1980년대"]
            },
            {
                id: "photo_002",
                imageUrl: "https://images.unsplash.com/photo-1516962215378-7fa2e137ae93?q=80&w=600&auto=format&fit=crop",
                title: "김씨 가문 전통 혼례식",
                year: "1978",
                location: "처인구 김량장동",
                donor: "이시민",
                tags: ["전통혼례", "가족", "1970년대"]
            },
            {
                id: "photo_003",
                imageUrl: "https://images.unsplash.com/photo-1478147427282-58a87a120781?q=80&w=600&auto=format&fit=crop",
                title: "용인초등학교 제 50회 졸업식",
                year: "1992",
                location: "처인구",
                donor: "박기록",
                tags: ["학교", "졸업식", "1990년대"]
            }
        ];

        // 갤러리를 화면에 그리는 함수
        function renderGallery(selectedTag) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = ''; // 기존 렌더링된 요소 제로베이스 초기화

            // 태그 조건에 맞게 배열 필터링
            const filteredData = selectedTag === '전체' 
                ? DUMMY_ARCHIVES 
                : DUMMY_ARCHIVES.filter(function(item) {
                    return item.tags.includes(selectedTag);
                });

            // 필터링된 배열을 순회하며 HTML 텍스트 조립
            filteredData.forEach(function(archive) {
                // 내부 태그들을 <span> 뱃지 형태로 변환
                const tagsHtml = archive.tags.map(function(t) {
                    return `<span class="text-xs bg-gray-200 text-gray-700 px-2 py-1 rounded">#${t}</span>`;
                }).join('');

                const cardHtml = `
                    <article class="bg-white rounded-xl shadow-md hover:shadow-xl transition-shadow duration-300 overflow-hidden border border-gray-100 fade-in">
                        <div class="aspect-video w-full overflow-hidden bg-gray-200">
                            <img src="${archive.imageUrl}" alt="${archive.title}" class="w-full h-full object-cover" />
                        </div>
                        <div class="p-5">
                            <h2 class="text-xl font-bold text-gray-800 mb-2">${archive.title}</h2>
                            <div class="text-sm text-gray-500 space-y-1 mb-4">
                                <p><span class="font-semibold">촬영:</span> ${archive.year}년 / ${archive.location}</p>
                                <p><span class="font-semibold">기증:</span> ${archive.donor}</p>
                            </div>
                            <div class="flex flex-wrap gap-2">
                                ${tagsHtml}
                            </div>
                        </div>
                    </article>
                `;
                container.innerHTML += cardHtml; // 조립된 카드를 컨테이너에 삽입
            });
        }
        // End of renderGallery

        // 필터 버튼을 생성하고 클릭 이벤트를 거는 함수
        function renderFilters() {
            const container = document.getElementById('filter-container');
            
            // 데이터에서 모든 태그를 중복 없이 추출
            let allTags = ['전체'];
            DUMMY_ARCHIVES.forEach(function(item) {
                item.tags.forEach(function(tag) {
                    if (!allTags.includes(tag)) {
                        allTags.push(tag);
                    }
                });
            });

            container.innerHTML = ''; // 제로베이스 초기화

            // 버튼 요소 생성 및 속성 부여
            allTags.forEach(function(tag) {
                const btn = document.createElement('button');
                btn.innerText = tag;
                // 기본 스타일 세팅
                btn.className = "filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors duration-200 border border-gray-300 bg-white text-gray-700 hover:bg-gray-100 focus:outline-none";
                
                // 첫 로드 시 '전체' 버튼 활성화 상태 표시
                if (tag === '전체') {
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
                    btn.classList.remove('bg-white', 'text-gray-700');
                }

                // 클릭 이벤트 바인딩
                btn.addEventListener('click', function() {
                    // 1. 모든 버튼의 파란색(활성화) 스타일을 제거하고 기본으로 되돌림
                    const allBtns = document.querySelectorAll('.filter-btn');
                    allBtns.forEach(function(b) {
                        b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                        b.classList.add('bg-white', 'text-gray-700');
                    });

                    // 2. 현재 클릭된 버튼만 파란색으로 활성화
                    btn.classList.remove('bg-white', 'text-gray-700');
                    btn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');

                    // 3. 갤러리 렌더링 함수 재호출
                    renderGallery(tag);
                });

                container.appendChild(btn);
            });
        }
        // End of renderFilters

        // 스크립트 최초 실행 지점
        function init() {
            renderFilters();
            renderGallery('전체');
        }
        // End of init

        // HTML 문서 구조가 완전히 로드된 후 스크립트 실행
        window.onload = init;
    </script>
</body>
</html>
